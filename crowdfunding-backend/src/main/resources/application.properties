spring.application.name=project

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/crowdfunding?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application Configuration
app.name=Crowdfunding Platform
app.url=http://localhost:8080
app.email.from=contact@crowdfunding-platform.cm
app.email.support=support@crowdfunding-platform.cm

# JWT Configuration
jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.example.project=DEBUG

# Stripe Configuration
stripe.secret.key=sk_test_your_stripe_secret_key_here
stripe.publishable.key=pk_test_your_stripe_publishable_key_here
stripe.webhook.secret=whsec_your_stripe_webhook_secret_here

# CinetPay Configuration (Mobile Money)
cinetpay.api.key=your_cinetpay_api_key
cinetpay.site.id=your_cinetpay_site_id
cinetpay.base.url=https://api.cinetpay.com
logging.level.org.springframework.security=DEBUG
