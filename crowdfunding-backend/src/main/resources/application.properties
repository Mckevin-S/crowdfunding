spring.application.name=project
server.address=0.0.0.0

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/crowdfunding?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Email Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application Configuration
app.name=Crowdfunding Platform
app.url=http://localhost:8080
app.email.from=contact@crowdfunding-platform.cm
app.email.support=support@crowdfunding-platform.cm

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration (Managed by logback-spring.xml)
logging.level.root=INFO
logging.level.com.example.project=DEBUG

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# CinetPay Configuration (Mobile Money)
cinetpay.api.key=${CINETPAY_API_KEY}
cinetpay.site.id=${CINETPAY_SITE_ID:}
cinetpay.base.url=https://api.cinetpay.com
logging.level.org.springframework.security=DEBUG

# OpenAI Configuration (GPT-4)
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4}

# Google OAuth2 Configuration
google.client.id=${GOOGLE_CLIENT_ID}
